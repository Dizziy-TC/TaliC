name: bluebuild
on:
  schedule:
    - cron: "00 06 * * *" # Täglicher automatischer Bau um 06:00 UTC
  push:
    paths-ignore:
      - "**.md"
  pull_request:
  workflow_dispatch: # Erlaubt es dir, den Bau manuell zu starten

concurrency:
  group: ${{ github.workflow }}-${{ github.ref || github.run_id }}
  cancel-in-progress: true

jobs:
  bluebuild:
    name: Build Custom Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
    strategy:
      fail-fast: false
      matrix:
        recipe:
          - recipe.yml
    steps:
      - name: Build Custom Image
        uses: blue-build/github-action@v1.8
        with:
          recipe: ${{ matrix.recipe }}
          registry_token: ${{ github.token }}
          pr_event_number: ${{ github.event.number }}
          cosign_private_key: ${{ secrets.SIGNING_SECRET }}
          maximize_build_space: true

  build-iso:
    name: Generate ISO
    needs: [bluebuild]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      # Dieser Schritt nutzt jetzt den direkten Docker-Pfad, um "Not Found" Fehler zu vermeiden
      - name: Generate ISO
        uses: docker://ghcr.io/blue-build/isogenerator:latest
        with:
          image-name: talic
          image-tag: latest
          registry: ghcr.io/${{ github.repository_owner }}
          installer-repo: fedora
          variant: 'Kinoite'
          arch: x86_64
          cosign-key: cosign.pub

      - name: Upload ISO as Artifact
        uses: actions/upload-artifact@v4
        with:
          name: talic-os-iso
          path: |
            ./*.iso
            ./*.sha256
          if-no-files-found: error
          retention-days: 7
