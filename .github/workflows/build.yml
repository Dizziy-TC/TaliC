name: bluebuild
on:
  schedule:
    - cron: "00 06 * * *"
  push:
    paths-ignore:
      - "**.md"
  pull_request:
  workflow_dispatch:

# Wir schalten hier global auf Node 24 um, um die Deprecation-Warnungen zu umgehen
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: ${{ github.workflow }}-${{ github.ref || github.run_id }}
  cancel-in-progress: true

jobs:
  bluebuild:
    name: Build Custom Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
    strategy:
      fail-fast: false
      matrix:
        recipe:
          - recipe.yml
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Build Custom Image
        uses: blue-build/github-action@v1.8
        with:
          recipe: ${{ matrix.recipe }}
          registry_token: ${{ github.token }}
          pr_event_number: ${{ github.event.number }}
          cosign_private_key: ${{ secrets.SIGNING_SECRET }}
          maximize_build_space: true

  build-iso:
    name: Generate ISO
    needs: [bluebuild]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      # Wir nutzen hier die stabilste Version für den Speicherplatz
      - name: Maximize build space
        uses: ublue-os/maximize-build-space@v1.3
        with:
          root-reserve-mb: 2000
          swap-size-mb: 1024
          remove-dotnet: true
          remove-android: true
          remove-haskell: true

      # Wir nutzen den Generator direkt über den stabilen v1-Zweig
      - name: Generate ISO
        uses: blue-build/isogenerator@v1
        with:
          image-name: talic
          image-tag: latest
          registry: ghcr.io/${{ github.repository_owner }}
          installer-repo: fedora
          variant: 'Kinoite'
          arch: x86_64
          cosign-key: cosign.pub

      - name: Upload ISO as Artifact
        uses: actions/upload-artifact@v4
        with:
          name: talic-os-iso
          path: |
            ./*.iso
            ./*.sha256
          if-no-files-found: error
          retention-days: 7
