# yaml-language-server: $schema=https://schema.blue-build.org/recipe-v1.json
name: talic
description: Hochmodernes Atomic Gaming- & Streaming-OS (KDE Plasma + NVIDIA).

base-image: ghcr.io/ublue-os/kinoite-nvidia
image-version: 43 # Das ersetzt 'fedora-version'

# 'scripts' und 'image-flavor' müssen jetzt in diesen Block, falls benötigt
# Da das ublue-base-image das meiste regelt, reicht das hier:

modules:
  # Modul für dein eigenes Icon
  - type: files
    files:
      - usr: /usr

  # System-Pakete
  - type: rpm-ostree
    repos:
      - https://mirrors.rpmfusion.org/free/fedora/rpmfusion-free-release-%s.noarch.rpm
      - https://mirrors.rpmfusion.org/nonfree/fedora/rpmfusion-nonfree-release-%s.noarch.rpm
    install:
      - steam
      - lutris
      - mangohud
      - gamemode
      - obs-studio
      - obs-studio-plugin-vaapi
      - pipewire-utils
      - nvtop
      - btop
      - xorg-x11-drv-nvidia-cuda

  # Apps & Tools (Das neue Format für Flatpaks v2)
  - type: default-flatpaks
    notify: true
    install: # 'system' wurde durch 'install' ersetzt
      - org.mozilla.firefox
      - com.discordapp.Discord
      - org.kde.kcalc
      - net.davidotek.pupgui2 

  # Script-Modul (Falls du dein post-install.sh ausführen willst)
  - type: script
    scripts:
      - post-install.sh
