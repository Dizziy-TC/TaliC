# yaml-language-server: $schema=https://schema.blue-build.org/recipe-v1.json
name: talic
description: Hochmodernes Atomic Gaming- & Streaming-OS (KDE Plasma + NVIDIA).

base-image: ghcr.io/ublue-os/kinoite-nvidia
image-version: 43

modules:
  # Das neue 'files' Format (V2) - Hier kommen deine Icons & Configs rein
  - type: files
    files:
      - source: usr # Sucht im Repository-Ordner 'files/usr'
        destination: /usr # Kopiert es direkt in das System-Verzeichnis /usr

  # System-Pakete
  - type: rpm-ostree
    repos:
      - https://mirrors.rpmfusion.org/free/fedora/rpmfusion-free-release-%s.noarch.rpm
      - https://mirrors.rpmfusion.org/nonfree/fedora/rpmfusion-nonfree-release-%s.noarch.rpm
    install:
      - steam
      - lutris
      - mangohud
      - gamemode
      - obs-studio
      - obs-studio-plugin-vaapi
      - pipewire-utils
      - nvtop
      - btop
      - xorg-x11-drv-nvidia-cuda

  # Apps & Tools (Flatpak-Format V2)
  - type: default-flatpaks
    configurations:
      - install:
          - org.mozilla.firefox
          - com.discordapp.Discord
          - org.kde.kcalc
          - net.davidotek.pupgui2

  # Scripte (Optimierungen beim Bauen)
  - type: script
    scripts:
      - post-install.sh
