# yaml-language-server: $schema=https://schema.blue-build.org/recipe-v1.json
name: talic
description: Hochmodernes Atomic Gaming- & Streaming-OS (KDE Plasma + NVIDIA).

base-image: ghcr.io/ublue-os/kinoite-nvidia
image-version: 43

modules:
  # Deine Dateien (Logo, ASCII, Fastfetch-Config)
  - type: files
    files:
      - source: usr
        destination: /usr
      - source: etc
        destination: /etc

  # System-Layer (Wir lassen Plymouth hier weg, da es schon im Basis-Image ist)
  - type: rpm-ostree
    repos:
      - https://mirrors.rpmfusion.org/free/fedora/rpmfusion-free-release-43.noarch.rpm
      - https://mirrors.rpmfusion.org/nonfree/fedora/rpmfusion-nonfree-release-43.noarch.rpm
    install:
      - fastfetch
      - mangohud
      - gamemode
      - obs-studio
      - obs-studio-plugin-vaapi
      - pipewire-utils
      - nvtop
      - btop

  # App-Layer (Flatpaks)
  - type: default-flatpaks
    configurations:
      - install:
          - com.valvesoftware.Steam
          - net.lutris.Lutris
          - org.mozilla.firefox
          - com.discordapp.Discord
          - org.kde.kcalc
          - net.davidotek.pupgui2

  # Scripte
  - type: script
    scripts:
      - post-install.sh
