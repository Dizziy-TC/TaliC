# yaml-language-server: $schema=https://schema.blue-build.org/recipe-v1.json
name: talic
description: Hochmodernes Atomic Gaming- & Streaming-OS (KDE Plasma + NVIDIA).

base-image: ghcr.io/ublue-os/kinoite-nvidia
image-version: 43

modules:
  # Deine eigenen Dateien (Icon etc.)
  - type: files
    files:
      - source: usr
        destination: /usr

  # System-Pakete
  - type: rpm-ostree
    repos:
      - https://mirrors.rpmfusion.org/free/fedora/rpmfusion-free-release-43.noarch.rpm
      - https://mirrors.rpmfusion.org/nonfree/fedora/rpmfusion-nonfree-release-43.noarch.rpm
    install:
      - steam
      - lutris
      - mangohud
      - gamemode
      - obs-studio
      - obs-studio-plugin-vaapi
      - pipewire-utils
      - nvtop
      - btop
      # NVIDIA-CUDA wurde entfernt, da es im Basis-Image bereits enthalten ist!

  # Das Flatpak-Format (V2)
  - type: default-flatpaks
    configurations:
      - install:
          - org.mozilla.firefox
          - com.discordapp.Discord
          - org.kde.kcalc
          - net.davidotek.pupgui2

  # Scripte
  - type: script
    scripts:
      - post-install.sh
