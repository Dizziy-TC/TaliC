# Das offizielle Rezept für TaliC OS
name: talic
description: Hochmodernes Atomic Gaming- & Streaming-OS (KDE Plasma + NVIDIA).

# Basis: Fedora Kinoite (Atomic KDE) mit NVIDIA-Treibern für maximale Leistung
base-image: ghcr.io/ublue-os/kinoite-nvidia
image-flavor: main
fedora-version: 43

scripts:
  post:
    - post-install.sh

modules:
  # Modul für dein eigenes Icon (wird aus files/usr kopiert)
  - type: files
    files:
      - usr: /usr

  # System-Pakete (fest im Kern des Betriebssystems verankert)
  - type: rpm-ostree
    repos:
      - https://mirrors.rpmfusion.org/free/fedora/rpmfusion-free-release-%s.noarch.rpm
      - https://mirrors.rpmfusion.org/nonfree/fedora/rpmfusion-nonfree-release-%s.noarch.rpm
    install:
      # Gaming-Basis
      - steam
      - lutris
      - mangohud
      - gamemode
      # Streaming & Audio-Performance
      - obs-studio
      - obs-studio-plugin-vaapi
      - pipewire-utils
      # Hardware-Tools für deinen starken PC
      - nvtop
      - btop
      - xorg-x11-drv-nvidia-cuda

  # Apps & Tools (als isolierte Flatpaks für mehr Sicherheit)
  - type: default-flatpaks
    notify: true
    system:
      - org.mozilla.firefox
      - com.discordapp.Discord
      - org.kde.kcalc
      # ProtonUp-Qt: Damit installierst du Proton GE mit einem Klick für Steam & Lutris
      - net.davidotek.pupgui2
